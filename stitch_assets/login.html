<!DOCTYPE html>

<!-- TopNavBar Suppression Check: Transactional screen (Login) usually suppresses global nav to prioritize focus,

<header class="fixed top-0 left-0 right-0 z-50 bg-slate-950/60 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(224,64,251,0.15)] font-['Be_Vietnam_Pro'] text-right">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 py-4 max-w-full mx-auto">
<div class="flex items-center gap-6">
<h1 class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-l from-fuchsia-500 to-purple-600">نكسوس غيمز</h1>
<nav class="hidden md:flex flex-row-reverse gap-8 items-center">
<a class="text-slate-400 hover:text-white transition-colors" href="#">المتجر</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">المكتبة</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">المجتمع</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">العروض</a>
</nav>
</div>
<div class="flex items-center gap-4">
<div class="relative hidden sm:block">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
<input class="bg-white/5 border border-white/10 rounded-full py-1.5 pr-10 pl-4 text-sm focus:outline-none focus:border-fuchsia-500 transition-all w-48 lg:w-64" placeholder="بحث..." type="text"/>
</div>
<div class="flex items-center gap-3">
<button class="text-slate-400 hover:text-white transition-all active:scale-95">
<span class="material-symbols-outlined">shopping_cart</span>
</button>
<button class="text-slate-400 hover:text-white transition-all active:scale-95 relative">
<span class="material-symbols-outlined">notifications</span>
<span class="absolute top-0 right-0 w-2 h-2 bg-fuchsia-500 rounded-full"></span>
</button>
<div class="w-8 h-8 rounded-full bg-slate-800 border border-white/10 overflow-hidden">

</div>
</div>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative px-6 pt-24 pb-12 overflow-hidden">
<!-- Animated Background Elements -->
<div class="neon-orb w-[500px] h-[500px] bg-primary-container -top-20 -right-20"></div>
<div class="neon-orb w-[400px] h-[400px] bg-secondary-container bottom-0 -left-20"></div>
<div class="neon-orb w-[300px] h-[300px] bg-fuchsia-600 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 opacity-20"></div>
<!-- Login Card -->
<div class="glass-card w-full max-w-[480px] rounded-[24px] p-8 md:p-12 shadow-2xl relative z-10 border border-white/5">
<!-- Header Section -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-fuchsia-500 to-purple-600 mb-6 shadow-[0_0_20px_rgba(224,64,251,0.4)]">
<span class="material-symbols-outlined text-white text-3xl" style="font-variation-settings: 'FILL' 1;">sports_esports</span>
</div>
<h2 class="font-headline-lg text-primary text-3xl mb-2">تسجيل الدخول</h2>
<p class="text-on-surface-variant text-body-md">أهلاً بك مجدداً في نكسوس غيمز</p>
</div>
<!-- Form -->
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">

<div class="relative group">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-fuchsia-500 transition-colors">mail</span>
<input class="w-full bg-slate-950/50 border border-white/10 rounded-xl py-4 pr-12 pl-4 text-right focus:outline-none focus:ring-2 focus:ring-fuchsia-500/30 focus:border-fuchsia-500 transition-all placeholder:text-slate-600 text-on-surface" placeholder="example@nexus.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="block text-right text-sm font-semibold text-slate-300 mr-1">كلمة المرور</label>
<div class="relative group">
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-fuchsia-500 transition-colors">lock</span>
<input class="w-full bg-slate-950/50 border border-white/10 rounded-xl py-4 pr-12 pl-4 text-right focus:outline-none focus:ring-2 focus:ring-fuchsia-500/30 focus:border-fuchsia-500 transition-all placeholder:text-slate-600 text-on-surface" placeholder="••••••••" type="password"/>
<button class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Forgot Password -->
<div class="flex items-center justify-between py-2">
<label class="flex items-center gap-3 cursor-pointer group">
<div class="relative">
<input class="peer sr-only" type="checkbox"/>
<div class="w-5 h-5 border-2 border-slate-600 rounded-md peer-checked:bg-fuchsia-500 peer-checked:border-fuchsia-500 transition-all flex items-center justify-center">
<span class="material-symbols-outlined text-white text-[16px] scale-0 peer-checked:scale-100 transition-transform">check</span>
</div>
</div>
<span class="text-sm text-slate-400 group-hover:text-slate-200 transition-colors">تذكرني</span>
</label>
<a class="text-sm text-fuchsia-400 hover:text-fuchsia-300 transition-colors" href="#">نسيت كلمة المرور؟</a>
</div>
<!-- Submit Button -->
<button class="w-full py-4 rounded-xl font-bold text-lg text-white bg-gradient-to-l from-fuchsia-500 to-purple-600 hover:from-fuchsia-600 hover:to-purple-700 active:scale-[0.98] transition-all shadow-[0_4px_20px_rgba(224,64,251,0.3)] flex items-center justify-center gap-2" type="submit">
<span>دخول</span>
<span class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Sign Up Link -->
<div class="mt-8 text-center">
<p class="text-slate-400">
                    ليس لديك حساب؟ 
                    <a class="text-fuchsia-500 font-bold hover:underline underline-offset-4 mr-1" href="#">سجل الآن</a>
</p>
</div>
<!-- Social Login Divider -->
<div class="mt-8 relative flex items-center justify-center">
<div class="border-t border-white/10 w-full"></div>
<span class="bg-[#1a1a2e] px-4 text-xs text-slate-500 absolute uppercase tracking-widest">أو عبر</span>

<div class="mt-8 grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all active:scale-95">
<img alt="Google" class="w-5 h-5 grayscale opacity-70 group-hover:grayscale-0" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAChPbPP2bx_9NQkPwa7q1QztIa7i8LDtJ_pr41MmHE8kBpjVZSN8Kb0fBzUAZKpuXTmUUgpCY7H7RrDM1NFujfU78F62OX77W1CojDQHGSojBUFeS2QK5njsd09yR2bKejt6woBrgOkzIv894fw4gqbJFm94l6OyGm_Lmq_X_oR1l_TyHHNs20i97ovHkqk7u1dq5fcIPNBWZ_krGpr_JMy_29euhXTAqPiGhJL2EQyoayCIaeODm6YwpthBc6B7CIu-HftMTr_hWS"/>
<span class="text-sm font-semibold">جوجل</span>
</button>
<button class="flex items-center justify-center gap-2 py-3 rounded-xl border border-white/10 bg-white/5 hover:bg-white/10 transition-all active:scale-95">
<span class="material-symbols-outlined text-slate-400" style="font-variation-settings: 'FILL' 1;">play_circle</span>
<span class="text-sm font-semibold">بلايستيشن</span>
</button>

<div class="flex flex-col md:flex-row-reverse items-center gap-8">
<div class="text-lg font-bold text-slate-200">نكسوس غيمز</div>
<div class="flex flex-row-reverse gap-6">
<a class="text-slate-500 hover:text-fuchsia-500 underline-offset-4 hover:underline transition-opacity opacity-80 hover:opacity-100" href="#">الشروط والأحكام</a>
<a class="text-slate-500 hover:text-fuchsia-500 underline-offset-4 hover:underline transition-opacity opacity-80 hover:opacity-100" href="#">سياسة الخصوصية</a>
<a class="text-slate-500 hover:text-fuchsia-500 underline-offset-4 hover:underline transition-opacity opacity-80 hover:opacity-100" href="#">اتصل بنا</a>
</div>
</div>
<div class="text-slate-500">
                © ٢٠٢٤ نكسوس غيمز. جميع الحقوق محفوظة
            </div>
<div class="flex gap-4">
<a class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-fuchsia-500/20 transition-all" href="#">
<span class="material-symbols-outlined text-slate-400">public</span>
</a>
<a class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-fuchsia-500/20 transition-all" href="#">

</a>
