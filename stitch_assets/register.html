<!DOCTYPE html>

<html class="dark" dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700;800;900&amp;family=Inter:wght@400;600&amp;family=Space+Grotesk:wght@600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#3b2f00",
                        "tertiary-fixed": "#ffe07d",
                        "secondary-fixed": "#eaddff",
                        "inverse-primary": "#a200bb",
                        "surface-container-lowest": "#140b15",
                        "primary-fixed-dim": "#faabff",
                        "on-secondary": "#3f008e",
                        "surface-bright": "#413541",
                        "surface-dim": "#1a101a",
                        "surface-container-high": "#322631",
                        "outline-variant": "#524152",
                        "on-error-container": "#ffdad6",
                        "inverse-surface": "#f0ddec",
                        "secondary-container": "#6001d1",
                        "on-tertiary-fixed": "#231b00",
                        "on-primary-fixed": "#35003f",
                        "on-secondary-fixed-variant": "#5a00c6",
                        "inverse-on-surface": "#382d38",
                        "on-tertiary-container": "#4d3e00",
                        "outline": "#9f8a9e",
                        "on-tertiary-fixed-variant": "#564500",
                        "on-primary": "#570066",
                        "error": "#ffb4ab",
                        "surface-container-highest": "#3d313c",
                        "on-primary-fixed-variant": "#7b008f",
                        "surface-container": "#271c27",
                        "secondary-fixed-dim": "#d2bbff",
                        "primary-container": "#e446ff",
                        "surface-variant": "#3d313c",
                        "tertiary-fixed-dim": "#e7c446",
                        "on-secondary-container": "#c9aeff",
                        "on-surface-variant": "#d7c0d4",
                        "primary-fixed": "#ffd6fe",
                        "surface": "#1a101a",
                        "on-error": "#690005",
                        "background": "#1a101a",
                        "surface-container-low": "#221823",
                        "error-container": "#93000a",
                        "tertiary-container": "#c9a82b",
                        "secondary": "#d2bbff",
                        "primary": "#faabff",
                        "tertiary": "#e7c446",
                        "surface-tint": "#faabff",
                        "on-background": "#f0ddec",
                        "on-secondary-fixed": "#25005a",
                        "on-surface": "#f0ddec",
                        "on-primary-container": "#4c0059"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "8px",
                        "margin-edge": "40px",
                        "section-gap": "80px",
                        "gutter": "24px",
                        "container-max": "1440px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Be Vietnam Pro"],
                        "label-caps": ["Space Grotesk"],
                        "headline-md": ["Be Vietnam Pro"],
                        "display-xl": ["Be Vietnam Pro"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "label-caps": ["14px", {"lineHeight": "1", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}],
                        "display-xl": ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-card {
            background: rgba(26, 16, 26, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .neon-glow-primary {
            box-shadow: 0 0 20px rgba(224, 64, 251, 0.15);
        }
        .neon-border:focus {
            border-color: #e040fb;
            box-shadow: 0 0 10px rgba(224, 64, 251, 0.4);
        }
        body {
            background-color: #0f0f1a;
            overflow-x: hidden;
        }
        .orb {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            border-radius: 9999px;
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md">
<!-- Floating Orbs Background -->
<div class="fixed inset-0 overflow-hidden pointer-events-none">
<div class="orb w-96 h-96 bg-primary top-[-10%] right-[-5%]"></div>
<div class="orb w-[500px] h-[500px] bg-secondary bottom-[-10%] left-[-10%]"></div>
<div class="orb w-64 h-64 bg-tertiary-container top-[40%] left-[20%] opacity-20"></div>
</div>
<!-- TopNavBar Shell -->
<header class="fixed top-0 left-0 right-0 z-50 bg-slate-950/60 backdrop-blur-xl border-b border-white/10 shadow-[0_0_20px_rgba(224,64,251,0.15)] font-['Be_Vietnam_Pro'] text-right">
<div class="flex flex-row-reverse justify-between items-center w-full px-6 py-4 max-w-full mx-auto">
<!-- Brand Logo -->
<div class="flex items-center">
<span class="text-2xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-l from-fuchsia-500 to-purple-600">نكسوس غيمز</span>
</div>
<!-- Navigation Links -->
<nav class="hidden md:flex flex-row-reverse items-center gap-8">
<a class="text-slate-400 hover:text-white transition-colors" href="#">المتجر</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">المكتبة</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">المجتمع</a>
<a class="text-slate-400 hover:text-white transition-colors" href="#">العروض</a>
</nav>
<!-- Actions Cluster -->
<div class="flex items-center gap-4">
<div class="relative">
<span class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer transition-colors" data-icon="search">search</span>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer active:scale-95 transition-transform" data-icon="shopping_cart">shopping_cart</span>
<span class="material-symbols-outlined text-slate-400 hover:text-white cursor-pointer active:scale-95 transition-transform" data-icon="notifications">notifications</span>
<img alt="صورة الملف الشخصي" class="w-10 h-10 rounded-full border border-white/10 object-cover" data-alt="A professional, high-resolution portrait of a stylish male gamer with subtle neon lighting reflecting on his face. The background is a blurred high-end gaming setup with deep purple and pink ambient light. He wears professional headphones and looks confidently at the camera, embodying a premium cyber-luxe aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuArh69sEn6YApYJVbjTjzS-T-ONsx2eC6FY6xGvbIDM7GNEtf7_4nWmQ56Xyr5gevackm_Do1BrhXnZhzAT8HMG3ZX4K8bf4WdZXx_XPIVts0T-dxc-9KNH9immDG4I0HwHvuL2Qay43IA-tf-cM-K-hoO1hPw2r6uHDyuj3MfBWvBMj-QEaj81cZAW4LZNRfN6qxMy3c8V9x5FNOHwasHfj8oTsByxS3c3qzzavolyqiOVu1OTErCtaH83WZ09n0QhZOCh9iBg3178"/>
</div>
</div>
</div>
</header>
<!-- Main Content: Registration Card -->
<main class="flex-grow flex items-center justify-center pt-24 pb-12 px-6 relative z-10">
<div class="glass-card w-full max-w-lg rounded-2xl p-8 md:p-10 neon-glow-primary">
<div class="text-center mb-8">
<h1 class="font-headline-lg text-primary mb-2">إنشاء حساب جديد</h1>
<p class="text-on-surface-variant font-body-md">انضم إلى مجتمع نكسوس غيمز الحصري اليوم</p>
</div>
<form class="space-y-6">
<!-- Full Name -->
<div class="space-y-2 text-right">
<label class="block text-sm font-label-caps text-on-surface-variant pr-1">الاسم الكامل</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl px-4 py-3 text-right focus:outline-none neon-border transition-all text-on-surface" placeholder="أدخل اسمك بالكامل" type="text"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl" data-icon="person">person</span>
</div>
</div>
<!-- Email -->
<div class="space-y-2 text-right">
<label class="block text-sm font-label-caps text-on-surface-variant pr-1">البريد الإلكتروني</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl px-4 py-3 text-right focus:outline-none neon-border transition-all text-on-surface" placeholder="example@domain.com" type="email"/>
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-xl" data-icon="mail">mail</span>
</div>
</div>
<!-- Password Row -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="space-y-2 text-right">
<label class="block text-sm font-label-caps text-on-surface-variant pr-1">كلمة المرور</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl px-4 py-3 text-right focus:outline-none neon-border transition-all text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="space-y-2 text-right">
<label class="block text-sm font-label-caps text-on-surface-variant pr-1">تأكيد كلمة المرور</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border border-white/5 rounded-xl px-4 py-3 text-right focus:outline-none neon-border transition-all text-on-surface" placeholder="••••••••" type="password"/>
</div>
</div>
</div>
<!-- Account Type Selector -->
<div class="space-y-3 text-right">
<label class="block text-sm font-label-caps text-on-surface-variant pr-1">نوع الحساب</label>
<div class="grid grid-cols-2 gap-3 bg-surface-container-highest/30 p-1.5 rounded-xl border border-white/5">
<label class="cursor-pointer group">
<input class="peer hidden" name="account_type" type="radio" value="admin"/>
<div class="py-2.5 text-center rounded-lg transition-all border border-transparent text-slate-400 peer-checked:bg-secondary-container/20 peer-checked:text-secondary peer-checked:border-secondary/30 group-hover:bg-white/5">
                                مدير
                            </div>
</label>
<label class="cursor-pointer group">
<input checked="" class="peer hidden" name="account_type" type="radio" value="user"/>
<div class="py-2.5 text-center rounded-lg transition-all border border-transparent text-slate-400 peer-checked:bg-primary-container/20 peer-checked:text-primary peer-checked:border-primary/30 group-hover:bg-white/5">
                                مستخدم عادي
                            </div>
</label>
</div>
</div>
<!-- Terms -->
<div class="flex items-center gap-3 justify-end text-right px-1">
<label class="text-sm text-slate-400">أوافق على الشروط والأحكام</label>
<input class="w-5 h-5 rounded border-white/10 bg-surface-container-highest/50 text-primary focus:ring-primary focus:ring-offset-background" type="checkbox"/>
</div>
<!-- Action Buttons -->
<button class="w-full py-4 bg-gradient-to-l from-fuchsia-500 to-purple-600 text-white font-headline-md rounded-xl hover:shadow-[0_0_30px_rgba(224,64,251,0.4)] active:scale-95 transition-all duration-300" type="submit">
                    إنشاء الحساب
                </button>
<div class="text-center mt-6">
<a class="text-sm font-body-md text-slate-400 hover:text-primary transition-colors duration-200" href="#">
                        لديك حساب؟ <span class="text-primary font-bold">سجل الدخول</span>
</a>
</div>
</form>
</div>
</main>
<!-- Footer Shell -->
<footer class="bg-slate-950/80 backdrop-blur-md font-['Be_Vietnam_Pro'] text-sm text-right full-width py-12 border-t border-white/5">
<div class="flex flex-col md:flex-row-reverse justify-between items-center px-12 w-full space-y-4 md:space-y-0 max-w-container-max mx-auto">
<div class="text-lg font-bold text-slate-200">نكسوس غيمز</div>
<div class="flex flex-row-reverse gap-8 items-center text-slate-500">
<a class="hover:text-fuchsia-500 underline-offset-4 hover:underline transition-colors" href="#">الشروط والأحكام</a>
<a class="hover:text-fuchsia-500 underline-offset-4 hover:underline transition-colors" href="#">سياسة الخصوصية</a>
<a class="hover:text-fuchsia-500 underline-offset-4 hover:underline transition-colors" href="#">اتصل بنا</a>
</div>
<p class="text-slate-500">© ٢٠٢٤ نكسوس غيمز. جميع الحقوق محفوظة</p>
</div>
</footer>
</body></html>
